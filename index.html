<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>枪豆人</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="home-bg" aria-hidden="true" width="960" height="540"></canvas>
  <div id="ui">
    <div id="hud" class="hidden">
      <span id="score">得分 0</span>
      <span id="health">生命 ♥♥♥</span>
      <div id="hud-online-meta" class="hud-online-meta hidden">
        <span id="hud-room" class="hud-chip"></span>
        <span id="hud-players" class="hud-chip"></span>
      </div>
      <div id="hud-online-badges" class="hud-online-badges hidden"></div>
      <span id="lobby-hint" class="hidden"></span>
      <button type="button" id="btn-ready" class="hidden">准备</button>
    </div>
    <div id="title-screen">
      <h1>枪豆人</h1>
      <p class="subtitle">鼠标瞄准 · 左键射击 · 靠开枪后坐力在水上滑行</p>
      <p id="progress-summary" class="meta-block progress-summary"></p>
      <p id="daily-challenge-summary" class="meta-block daily-challenge-summary"></p>
      <p id="achievement-mini" class="meta-block achievement-mini"></p>
      <div class="mode-row">
        <button type="button" id="btn-offline">单机练习</button>
        <button type="button" id="btn-online" class="primary">联机对战</button>
      </div>
      <div id="offline-level-panel" class="hidden">
        <p class="panel-title">单机 — 选择起始关卡</p>
        <div id="offline-level-list" class="level-list"></div>
        <button type="button" id="btn-offline-back" class="ghost wide-btn">返回</button>
      </div>
      <div id="online-panel" class="hidden">
        <label class="field">
          <span>房间名</span>
          <input type="text" id="room-id" placeholder="默认 public" maxlength="32" autocomplete="off" />
        </label>
        <label class="field">
          <span>房间类型</span>
          <select id="room-visibility">
            <option value="public">公开</option>
            <option value="private">私密</option>
          </select>
        </label>
        <label class="field">
          <span>人数上限（2-8）</span>
          <input type="number" id="room-max-players" min="2" max="8" step="1" value="4" />
        </label>
        <label class="field hidden" id="room-code-wrap">
          <span>房间口令</span>
          <input type="text" id="room-join-code" placeholder="私密房口令" maxlength="24" autocomplete="off" />
        </label>
        <p class="hint">好友输入同一房间名即可同场。联机需先在本机运行 <code>npm install</code> 与 <code>npm start</code>，再用浏览器打开控制台提示的地址（本地文件打开时会连到 <code>localhost:3333</code>）。</p>
        <p class="hint hint-subtle">每日挑战与日期种子修正<strong>仅单机生效</strong>；联机沿用服务器规则（实验性提示，与今日挑战无关）。</p>
        <button type="button" id="btn-join" class="primary">进入房间</button>
        <button type="button" id="btn-start" class="ghost hidden">房主开始</button>
        <p id="net-status" class="net-status"></p>
      </div>
    </div>
    <div id="game-over" class="hidden">
      <h2 id="go-title">游戏结束</h2>
      <p id="go-msg"></p>
      <div class="report-actions">
        <button type="button" id="btn-copy-report" class="ghost">复制战报</button>
        <p id="copy-report-hint" class="copy-report-hint hidden"></p>
      </div>
      <div class="mode-row">
        <button type="button" id="restart-btn">再来一局</button>
        <button type="button" id="btn-back-menu" class="ghost">返回菜单</button>
      </div>
    </div>
    <div id="tutorial-overlay" class="hidden">
      <div class="tutorial-card">
        <h3 id="tutorial-title">新手引导</h3>
        <p id="tutorial-text"></p>
        <div class="mode-row">
          <button type="button" id="btn-tutorial-next" class="primary">下一步</button>
          <button type="button" id="btn-tutorial-skip" class="ghost">跳过</button>
        </div>
      </div>
    </div>
    <div id="perk-overlay" class="hidden">
      <div class="perk-card">
        <h3>波次强化：三选一</h3>
        <p id="perk-subtitle">选择一个强化后进入下一波</p>
        <div id="perk-options" class="perk-options"></div>
      </div>
    </div>
  </div>
  <canvas id="game" class="hidden" width="960" height="540"></canvas>
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
